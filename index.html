<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil — Community Issues</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --civic-blue: #1a3a5c;
      --civic-blue-light: #e8f0f8;
      --civic-accent: #e85d2f;
      --civic-accent-light: #fdf1ec;
      --civic-green: #2d7a4f;
      --civic-green-light: #eaf5ef;
      --civic-amber: #b86a00;
      --civic-amber-light: #fff4e3;
      --text-main: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --surface: #ffffff;
      --surface2: #f9fafb;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body { font-family: 'DM Sans', sans-serif; font-size: 14px; background: #f3f4f6; color: var(--text-main); min-height: 100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--civic-blue); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--civic-accent); }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .official-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--civic-blue-light); color: var(--civic-blue); }

    /* ── Buttons ── */
    .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .btn:hover { background: var(--surface2); }
    .btn-primary { background: var(--civic-blue); color: #fff; border-color: transparent; }
    .btn-primary:hover { background: #1e4875; }
    .btn-accent { background: var(--civic-accent); color: #fff; border-color: transparent; }
    .btn-accent:hover { background: #c94f24; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Layout ── */
    .page { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── Stats ── */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; }
    .stat-number { font-size: 24px; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

    /* ── Filter bar ── */
    .filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
    .filter-btn.active { background: var(--civic-blue); color: #fff; border-color: var(--civic-blue); }
    .filter-btn:hover:not(.active) { background: var(--surface2); color: var(--text-main); }
    .sort-select { margin-left: auto; font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text-muted); font-family: 'DM Sans', sans-serif; cursor: pointer; }

    /* ── Feed ── */
    .feed { display: flex; flex-direction: column; gap: 10px; }

    /* ── Post card ── */
    .post { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
    .post:hover { border-color: #d1d5db; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

    .vote-col { display: flex; flex-direction: column; align-items: center; padding: 14px 10px; gap: 4px; background: var(--surface2); min-width: 50px; border-right: 1px solid var(--border); }
    .vote-btn { width: 28px; height: 28px; border-radius: 6px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; transition: all 0.15s; }
    .vote-btn:hover { background: var(--civic-blue-light); color: var(--civic-blue); }
    .vote-btn.voted-up { color: var(--civic-accent); background: var(--civic-accent-light); }
    .vote-btn.voted-down { color: var(--civic-blue); background: var(--civic-blue-light); }
    .vote-count { font-size: 14px; font-weight: 600; color: var(--text-main); min-width: 24px; text-align: center; }

    .post-body { flex: 1; padding: 14px 18px; min-width: 0; }
    .post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }

    .category-tag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .cat-Roads    { background: var(--civic-amber-light); color: var(--civic-amber); }
    .cat-Safety   { background: #fce8e8; color: #a83232; }
    .cat-Traffic  { background: var(--civic-blue-light); color: var(--civic-blue); }
    .cat-Parks    { background: var(--civic-green-light); color: var(--civic-green); }
    .cat-Other    { background: var(--surface2); color: var(--text-muted); }

    .neighborhood-tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: #f0f0f5; color: #4a4a6a; text-transform: uppercase; letter-spacing: 0.4px; }

    .status-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .status-Open        { background: #fce8e8; color: #a83232; }
    .status-In-Progress { background: var(--civic-amber-light); color: var(--civic-amber); }
    .status-Resolved    { background: var(--civic-green-light); color: var(--civic-green); }

    .post-meta-info { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .post-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; line-height: 1.45; }
    .post-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }
    .post-location { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .post-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .post-action { font-size: 12px; color: var(--text-muted); cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: var(--radius); transition: background 0.15s; }
    .post-action:hover { background: var(--surface2); color: var(--text-main); }

    /* ── Official response ── */
    .official-response { margin-top: 12px; padding: 12px 14px; border-radius: var(--radius); background: var(--civic-blue-light); border-left: 3px solid var(--civic-blue); }
    .official-response-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .official-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--civic-blue); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .official-name { font-size: 12px; font-weight: 600; color: var(--civic-blue); }
    .official-dept { font-size: 11px; color: var(--text-muted); }
    .official-response p { font-size: 13px; line-height: 1.6; }

    /* ── Comments section ── */
    .comments-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .comment { display: flex; gap: 10px; margin-bottom: 10px; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; }
    .comment-body { flex: 1; }
    .comment-author { font-size: 12px; font-weight: 600; }
    .comment-text { font-size: 13px; color: var(--text-main); line-height: 1.5; margin-top: 2px; }
    .comment-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .comment-form { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text-main); }
    .comment-input:focus { outline: none; border-color: var(--civic-blue); }

    /* ── Modals ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 26px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 21px; color: var(--civic-blue); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text-main); }
    .form-input:focus { outline: none; border-color: var(--civic-blue); }
    textarea.form-input { resize: vertical; min-height: 90px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-note { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; }
    .error-msg { font-size: 13px; color: #a83232; background: #fce8e8; padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px; display: none; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-main); color: #fff; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }

    /* ── Tabs (for comments toggle) ── */
    .expand-link { font-size: 12px; color: var(--civic-blue); cursor: pointer; font-weight: 500; margin-top: 4px; display: inline-block; }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-number { font-size: 18px; }
      .header { padding: 12px 16px; }
      .post-meta-info { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo"><div class="logo-dot"></div>Civil</div>
  <div class="header-actions">
    <span id="user-badge" class="official-badge" style="display:none;"></span>
    <button class="btn btn-sm" id="auth-btn">Sign in</button>
    <button class="btn btn-accent btn-sm" id="report-btn">+ Report issue</button>
  </div>
</div>

<!-- Main content -->
<div class="page">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-number" id="stat-total">—</div><div class="stat-label">Issues reported</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-progress">—</div><div class="stat-label">In progress</div></div>
    <div class="stat-card"><div class="stat-number" id="stat-resolved">—</div><div class="stat-label">Resolved</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="Roads">Roads</button>
    <button class="filter-btn" data-cat="Safety">Safety</button>
    <button class="filter-btn" data-cat="Traffic">Traffic</button>
    <button class="filter-btn" data-cat="Parks">Parks</button>
    <button class="filter-btn" data-cat="Other">Other</button>
    <select class="sort-select" id="sort-select">
      <option value="votes">Top voted</option>
      <option value="new">Newest</option>
      <option value="open">Open first</option>
    </select>
  </div>

  <div class="filter-bar" style="margin-top: -6px;">
    <span style="font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px;">Neighborhood</span>
    <button class="filter-btn active" data-hood="all">All areas</button>
    <button class="filter-btn" data-hood="Santa Monica">Santa Monica</button>
    <button class="filter-btn" data-hood="Venice">Venice</button>
  </div>

  <div class="feed" id="feed"><div class="loading">Loading issues…</div></div>
</div>

<!-- Report Issue Modal -->
<div class="modal-overlay" id="report-modal" style="display:none;">
  <div class="modal">
    <h2>Report a community issue</h2>
    <div class="error-msg" id="report-error"></div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input type="text" class="form-input" id="issue-title" placeholder="e.g. Large pothole on Elm St near Oak Ave" maxlength="120" />
    </div>
    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-input" id="issue-cat">
        <option value="Roads">Roads &amp; Potholes</option>
        <option value="Safety">Safety &amp; Signs</option>
        <option value="Traffic">Traffic</option>
        <option value="Parks">Parks &amp; Green spaces</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Neighborhood *</label>
      <select class="form-input" id="issue-hood">
        <option value="Santa Monica">Santa Monica</option>
        <option value="Venice">Venice</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Location *</label>
      <input type="text" class="form-input" id="issue-loc" placeholder="e.g. 400 block of Elm St, near Oak Ave" maxlength="120" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="issue-desc" placeholder="Describe the issue and why it matters to the community…" maxlength="800"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('report-modal')">Cancel</button>
      <button class="btn btn-accent" id="submit-issue-btn">Submit issue</button>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal" style="display:none;">
  <div class="modal">
    <h2 id="auth-title">Sign in to Civil</h2>
    <div class="error-msg" id="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="auth-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="auth-pass" placeholder="••••••••" />
    </div>
    <div class="modal-actions">
      <button class="btn" id="auth-toggle-btn">Create account instead</button>
      <button class="btn btn-primary" id="auth-submit-btn">Sign in</button>
    </div>
    <p class="modal-note">Local officials: use your assigned government email to sign in.</p>
  </div>
</div>

<!-- Official Update Modal -->
<div class="modal-overlay" id="official-modal" style="display:none;">
  <div class="modal">
    <h2>Post official update</h2>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input" id="official-status">
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Update message *</label>
      <textarea class="form-input" id="official-text" placeholder="Describe what the department is doing or has done…" maxlength="600"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('official-modal')">Cancel</button>
      <button class="btn btn-primary" id="official-submit-btn">Post update</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  CONFIGURATION — replace with your Supabase values
// ════════════════════════════════════════════════════
const SUPABASE_URL = 'https://zohkmusrddsbkxdbdnnj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvaGttdXNyZGRzYmt4ZGJkbm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjYxODIsImV4cCI6MjA5MjM0MjE4Mn0.ObO2LgbAJf4gpa5AcNaOh-ZXlkgYiMH-tBz-GJsq5Xk';

// Emails that get the "Official" badge and can post status updates
// Add whatever government emails you create in Supabase
const OFFICIAL_EMAILS = [
  'publicworks@yourcity.gov',
  'traffic@yourcity.gov',
  'parks@yourcity.gov',
];

// ════════════════════════════════════════════════════
//  Supabase client
// ════════════════════════════════════════════════════
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ════════════════════════════════════════════════════
//  App state
// ════════════════════════════════════════════════════
let currentUser = null;
let currentFilter = 'all';
let currentNeighborhood = 'all';
let currentSort = 'votes';
let userVotes = {};          // { issue_id: 1 | -1 }
let expandedComments = {};   // { issue_id: true }
let officialTargetId = null;

const NEIGHBORHOODS = ['Santa Monica', 'Venice'];

// ════════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════════
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await handleSession(session);

  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session) await handleSession(session);
    else { currentUser = null; userVotes = {}; renderAuthUI(); renderFeed(); }
  });

  attachFilterListeners();
  document.getElementById('sort-select').addEventListener('change', e => { currentSort = e.target.value; renderFeed(); });
  document.getElementById('auth-btn').addEventListener('click', openAuthModal);
  document.getElementById('report-btn').addEventListener('click', () => {
    if (!currentUser) { openAuthModal(); return; }
    openModal('report-modal');
  });
  document.getElementById('submit-issue-btn').addEventListener('click', submitIssue);
  document.getElementById('auth-submit-btn').addEventListener('click', doAuth);
  document.getElementById('auth-toggle-btn').addEventListener('click', toggleAuthMode);
  document.getElementById('official-submit-btn').addEventListener('click', submitOfficialUpdate);

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.style.display = 'none'; });
  });

  await loadIssues();
})();

async function handleSession(session) {
  currentUser = session.user;
  await loadUserVotes();
  renderAuthUI();
}

function renderAuthUI() {
  const badge = document.getElementById('user-badge');
  const btn = document.getElementById('auth-btn');
  if (currentUser) {
    const isOfficial = OFFICIAL_EMAILS.includes(currentUser.email);
    badge.textContent = isOfficial ? '🏛 Official' : currentUser.email.split('@')[0];
    badge.style.display = 'inline';
    btn.textContent = 'Sign out';
    btn.onclick = doSignOut;
  } else {
    badge.style.display = 'none';
    btn.textContent = 'Sign in';
    btn.onclick = openAuthModal;
  }
}

// ════════════════════════════════════════════════════
//  Data loading
// ════════════════════════════════════════════════════
async function loadIssues() {
  document.getElementById('feed').innerHTML = '<div class="loading">Loading issues…</div>';
  const { data, error } = await sb.from('issues').select('*, comments(count)').order('created_at', { ascending: false });
  if (error) { document.getElementById('feed').innerHTML = '<div class="empty-state">Could not load issues. Check your Supabase config.</div>'; return; }
  updateStats(data);
  renderFeed(data);
}

async function loadUserVotes() {
  if (!currentUser) return;
  const { data } = await sb.from('votes').select('issue_id, value').eq('user_id', currentUser.id);
  if (data) data.forEach(v => { userVotes[v.issue_id] = v.value; });
}

// ════════════════════════════════════════════════════
//  Stats
// ════════════════════════════════════════════════════
function updateStats(issues) {
  document.getElementById('stat-total').textContent = issues.length;
  document.getElementById('stat-progress').textContent = issues.filter(i => i.status === 'In Progress').length;
  document.getElementById('stat-resolved').textContent = issues.filter(i => i.status === 'Resolved').length;
}

// ════════════════════════════════════════════════════
//  Render feed
// ════════════════════════════════════════════════════
async function renderFeed(issuesParam) {
  let issues = issuesParam;
  if (!issues) {
    const { data } = await sb.from('issues').select('*, comments(count)').order('created_at', { ascending: false });
    issues = data || [];
    updateStats(issues);
  }

  // Filter
  if (currentFilter !== 'all') issues = issues.filter(i => i.category === currentFilter);
  if (currentNeighborhood !== 'all') issues = issues.filter(i => i.neighborhood === currentNeighborhood);

  // Sort
  if (currentSort === 'votes') issues = [...issues].sort((a, b) => b.vote_score - a.vote_score);
  else if (currentSort === 'new') issues = [...issues].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else if (currentSort === 'open') {
    const order = ['Open', 'In Progress', 'Resolved'];
    issues = [...issues].sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
  }

  const feed = document.getElementById('feed');
  if (!issues.length) { feed.innerHTML = '<div class="empty-state">No issues yet in this category. Be the first to report one!</div>'; return; }

  feed.innerHTML = issues.map(issue => {
    const uv = userVotes[issue.id] || 0;
    const commentCount = issue.comments?.[0]?.count ?? 0;
    const isOfficial = currentUser && OFFICIAL_EMAILS.includes(currentUser.email);
    const statusKey = issue.status.replace(' ', '-');
    const dateStr = new Date(issue.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `
    <div class="post" id="post-${issue.id}">
      <div class="vote-col">
        <button class="vote-btn ${uv === 1 ? 'voted-up' : ''}" title="Upvote" onclick="vote('${issue.id}', 1)">▲</button>
        <div class="vote-count" id="score-${issue.id}">${issue.vote_score ?? 0}</div>
        <button class="vote-btn ${uv === -1 ? 'voted-down' : ''}" title="Downvote" onclick="vote('${issue.id}', -1)">▼</button>
      </div>
      <div class="post-body">
        <div class="post-meta">
          <span class="category-tag cat-${issue.category}">${issue.category}</span>
          <span class="status-badge status-${statusKey}">${issue.status}</span>
          ${issue.neighborhood ? `<span class="neighborhood-tag">📍 ${escHtml(issue.neighborhood)}</span>` : ''}
          <span class="post-meta-info">${issue.location} · ${dateStr}</span>
        </div>
        <div class="post-title">${escHtml(issue.title)}</div>
        ${issue.description ? `<div class="post-desc">${escHtml(issue.description)}</div>` : ''}
        ${issue.official_response ? `
        <div class="official-response">
          <div class="official-response-header">
            <div class="official-avatar">🏛</div>
            <div>
              <div class="official-name">${escHtml(issue.official_name || 'City Official')}</div>
              <div class="official-dept">Official update</div>
            </div>
          </div>
          <p>${escHtml(issue.official_response)}</p>
        </div>` : ''}
        <div class="post-footer">
          <div class="post-action" onclick="toggleComments('${issue.id}')">💬 ${commentCount} comment${commentCount !== 1 ? 's' : ''}</div>
          ${isOfficial ? `<div class="post-action" onclick="openOfficialModal('${issue.id}')">✏️ Post update</div>` : ''}
        </div>
        <div id="comments-${issue.id}" style="display:none;"></div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  Voting
// ════════════════════════════════════════════════════
async function vote(issueId, dir) {
  if (!currentUser) { openAuthModal(); return; }
  const prev = userVotes[issueId] || 0;
  const newVal = prev === dir ? 0 : dir;
  const delta = newVal - prev;

  // Optimistic UI update
  const scoreEl = document.getElementById(`score-${issueId}`);
  if (scoreEl) scoreEl.textContent = parseInt(scoreEl.textContent) + delta;
  userVotes[issueId] = newVal;

  // Upsert vote
  if (newVal === 0) {
    await sb.from('votes').delete().eq('user_id', currentUser.id).eq('issue_id', issueId);
  } else {
    await sb.from('votes').upsert({ user_id: currentUser.id, issue_id: issueId, value: newVal }, { onConflict: 'user_id,issue_id' });
  }
  // Update vote_score on the issue row
  const { data } = await sb.rpc('recalc_vote_score', { p_issue_id: issueId });
  if (scoreEl && data !== null) scoreEl.textContent = data;
}

// ════════════════════════════════════════════════════
//  Comments
// ════════════════════════════════════════════════════
async function toggleComments(issueId) {
  const el = document.getElementById(`comments-${issueId}`);
  if (el.style.display === 'none') {
    el.style.display = 'block';
    await loadComments(issueId);
  } else {
    el.style.display = 'none';
  }
}

async function loadComments(issueId) {
  const el = document.getElementById(`comments-${issueId}`);
  el.innerHTML = '<div class="loading" style="padding:8px 0;">Loading…</div>';
  const { data } = await sb.from('comments').select('*').eq('issue_id', issueId).order('created_at', { ascending: true });
  const comments = data || [];
  const isOfficial = currentUser && OFFICIAL_EMAILS.includes(currentUser.email);
  const canComment = !!currentUser;

  el.innerHTML = `
    <div class="comments-section">
      ${comments.map(c => `
        <div class="comment">
          <div class="comment-avatar">${(c.author_name || 'A').charAt(0).toUpperCase()}</div>
          <div class="comment-body">
            <div class="comment-author">${escHtml(c.author_name || 'Anonymous')} ${c.is_official ? '<span class="official-badge" style="font-size:10px;">Official</span>' : ''}</div>
            <div class="comment-text">${escHtml(c.body)}</div>
            <div class="comment-date">${new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
          </div>
        </div>`).join('')}
      ${canComment ? `
        <div class="comment-form">
          <input class="comment-input" id="comment-input-${issueId}" placeholder="Add a comment…" maxlength="400" />
          <button class="btn btn-sm btn-primary" onclick="postComment('${issueId}')">Post</button>
        </div>` : `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;"><a href="#" onclick="openAuthModal();return false;">Sign in</a> to leave a comment.</div>`}
    </div>`;
}

async function postComment(issueId) {
  const input = document.getElementById(`comment-input-${issueId}`);
  const body = input.value.trim();
  if (!body) return;
  const isOfficial = OFFICIAL_EMAILS.includes(currentUser.email);
  const { error } = await sb.from('comments').insert({
    issue_id: issueId,
    user_id: currentUser.id,
    author_name: currentUser.email.split('@')[0],
    body,
    is_official: isOfficial,
  });
  if (!error) { input.value = ''; await loadComments(issueId); }
}

// ════════════════════════════════════════════════════
//  Submit new issue
// ════════════════════════════════════════════════════
async function submitIssue() {
  const title = document.getElementById('issue-title').value.trim();
  const category = document.getElementById('issue-cat').value;
  const neighborhood = document.getElementById('issue-hood').value;
  const location = document.getElementById('issue-loc').value.trim();
  const description = document.getElementById('issue-desc').value.trim();
  const errEl = document.getElementById('report-error');

  if (!title || !location) { showError(errEl, 'Please fill in the title and location.'); return; }

  const btn = document.getElementById('submit-issue-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';

  const { error } = await sb.from('issues').insert({
    title, category, neighborhood, location, description,
    status: 'Open', vote_score: 1,
    user_id: currentUser.id,
  });

  btn.disabled = false; btn.textContent = 'Submit issue';
  if (error) { showError(errEl, error.message); return; }

  // Also add the submitter's upvote
  const { data: newIssue } = await sb.from('issues').select('id').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(1).single();
  if (newIssue) {
    await sb.from('votes').insert({ user_id: currentUser.id, issue_id: newIssue.id, value: 1 });
    userVotes[newIssue.id] = 1;
  }

  closeModal('report-modal');
  document.getElementById('issue-title').value = '';
  document.getElementById('issue-hood').value = 'Santa Monica';
  document.getElementById('issue-loc').value = '';
  document.getElementById('issue-desc').value = '';
  showToast('Issue submitted! Thank you.');
  await loadIssues();
}

// ════════════════════════════════════════════════════
//  Official update
// ════════════════════════════════════════════════════
function openOfficialModal(issueId) {
  officialTargetId = issueId;
  openModal('official-modal');
}

async function submitOfficialUpdate() {
  const status = document.getElementById('official-status').value;
  const text = document.getElementById('official-text').value.trim();
  if (!text) return;
  const btn = document.getElementById('official-submit-btn');
  btn.disabled = true; btn.textContent = 'Posting…';
  await sb.from('issues').update({
    status,
    official_response: text,
    official_name: currentUser.email.split('@')[0],
  }).eq('id', officialTargetId);
  btn.disabled = false; btn.textContent = 'Post update';
  closeModal('official-modal');
  document.getElementById('official-text').value = '';
  showToast('Update posted!');
  await loadIssues();
}

// ════════════════════════════════════════════════════
//  Auth
// ════════════════════════════════════════════════════
let authMode = 'signin';
function openAuthModal() { authMode = 'signin'; syncAuthModal(); openModal('auth-modal'); }
function toggleAuthMode() { authMode = authMode === 'signin' ? 'signup' : 'signin'; syncAuthModal(); }
function syncAuthModal() {
  document.getElementById('auth-title').textContent = authMode === 'signin' ? 'Sign in to Civil' : 'Create an account';
  document.getElementById('auth-submit-btn').textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
  document.getElementById('auth-toggle-btn').textContent = authMode === 'signin' ? 'Create account instead' : 'Sign in instead';
  document.getElementById('auth-error').style.display = 'none';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  if (!email || !pass) { showError(errEl, 'Please enter your email and password.'); return; }
  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  let error;
  if (authMode === 'signin') {
    ({ error } = await sb.auth.signInWithPassword({ email, password: pass }));
  } else {
    ({ error } = await sb.auth.signUp({ email, password: pass }));
    if (!error) { showToast('Account created! Check your email to confirm.'); closeModal('auth-modal'); btn.disabled = false; return; }
  }
  btn.disabled = false;
  if (error) { showError(errEl, error.message); return; }
  closeModal('auth-modal');
  showToast('Signed in!');
  await loadIssues();
}

async function doSignOut() {
  await sb.auth.signOut();
  currentUser = null; userVotes = {};
  renderAuthUI();
  showToast('Signed out.');
  await loadIssues();
}

// ════════════════════════════════════════════════════
//  Filters
// ════════════════════════════════════════════════════
function attachFilterListeners() {
  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.cat;
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    });
  });
  document.querySelectorAll('.filter-btn[data-hood]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentNeighborhood = btn.dataset.hood;
      document.querySelectorAll('.filter-btn[data-hood]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    });
  });
}

// ════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
